name = "reel-atlas"
main = "src/index.ts"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

# --- D1 (knowledge DB) ---
# Provision:  bunx wrangler d1 create reel-atlas
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "reel-atlas"
database_id = "PLACEHOLDER_D1_DATABASE_ID"
migrations_dir = "src/db/migrations"

# --- R2 (media storage) ---
# Provision:  bunx wrangler r2 bucket create reel-atlas-media
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "reel-atlas-media"

# --- Queues (job pipeline) ---
# Provision:  bunx wrangler queues create reel-ingest
#             bunx wrangler queues create reel-ingest-dlq
[[queues.producers]]
binding = "INGEST_QUEUE"
queue = "reel-ingest"

[[queues.consumers]]
queue = "reel-ingest"
max_batch_size = 1
max_retries = 3
dead_letter_queue = "reel-ingest-dlq"

# --- Container (yt-dlp + ffmpeg ingest) ---
# The IngestContainer class is exported from src/index.ts and backed by the
# image in ./container/Dockerfile. Implemented in plan 01-03.
[[containers]]
class_name = "IngestContainer"
image = "./container/Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
name = "INGEST_CONTAINER"
class_name = "IngestContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IngestContainer"]

# --- Vars / secrets ---
# Secrets (set via `bunx wrangler secret put <NAME>`), do NOT commit:
#   TELEGRAM_BOT_TOKEN        - from @BotFather
#   TELEGRAM_WEBHOOK_SECRET   - self-chosen random string (verifies webhook calls)
# Local dev reads these from .dev.vars (see .dev.vars.example).
[observability]
enabled = true
